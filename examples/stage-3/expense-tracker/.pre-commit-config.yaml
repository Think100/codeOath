repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: import-linter
        name: Import linter
        entry: lint-imports
        language: system
        pass_filenames: false
        types: [python]
