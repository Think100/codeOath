{% extends "base.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<article class="post-full">
    <h1>{{ post.title }}</h1>
    <time>{{ post.date.strftime('%B %d, %Y') }}</time>
    {% if post.tags %}
    <div class="tags">
        {% for tag in post.tags %}
        <span class="tag">{{ tag }}</span>
        {% endfor %}
    </div>
    {% endif %}
    <div class="post-body">
        {{ post.body_html | safe }}
    </div>
</article>
<a href="/" class="back-link">&larr; Back to all posts</a>
{% endblock %}
