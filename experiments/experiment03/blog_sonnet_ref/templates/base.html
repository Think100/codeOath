<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog{% endblock %}</title>
    <style>
        body {
            font-family: Georgia, serif;
            max-width: 720px;
            margin: 2rem auto;
            padding: 0 1rem;
            color: #222;
            line-height: 1.7;
        }
        a { color: #0055bb; text-decoration: none; }
        a:hover { text-decoration: underline; }
        header { border-bottom: 1px solid #ddd; margin-bottom: 2rem; padding-bottom: 0.5rem; }
        header h1 { margin: 0; font-size: 1.6rem; }
        .post-meta { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .tag {
            display: inline-block;
            background: #eef;
            border-radius: 3px;
            padding: 0.1em 0.5em;
            font-size: 0.8rem;
            margin-right: 0.3em;
            color: #446;
        }
        .post-list { list-style: none; padding: 0; }
        .post-list li { margin-bottom: 1.2rem; border-bottom: 1px solid #eee; padding-bottom: 1rem; }
        .post-list .post-title { font-size: 1.2rem; font-weight: bold; }
        code { background: #f4f4f4; padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.9em; }
        pre { background: #f4f4f4; padding: 1em; overflow-x: auto; border-radius: 4px; }
        pre code { background: none; padding: 0; }
        blockquote { border-left: 3px solid #ccc; margin: 0; padding-left: 1em; color: #555; font-style: italic; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/">My Blog</a></h1>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
