{% extends "base.html" %}
{% block title %}{{ post.title }}{% endblock %}
{% block content %}
<article class="post-detail">
    <h2>{{ post.title }}</h2>
    <time datetime="{{ post.date.isoformat() }}">{{ post.date.strftime('%B %d, %Y') }}</time>
    {% if post.tags %}
    <div class="tags">
        {% for tag in post.tags %}
        <span class="tag">{{ tag }}</span>
        {% endfor %}
    </div>
    {% endif %}
    <div class="post-body">
        {{ content | safe }}
    </div>
</article>
<a href="/">&larr; Back to all posts</a>
{% endblock %}
